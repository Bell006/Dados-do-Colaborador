{% load static %}

<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap" rel="stylesheet">
    
    <link href="{% static 'css/bootstrap.min.css' %}" rel="stylesheet">
    <link href="{% static 'css/styles.css' %}" rel="stylesheet">
    <title>Dados</title>
</head>
<body>
    {% if messages %}
        <div class="alert">
            {% for message in messages %}
            <div class="alert alert-danger" role="alert">
                {{ message }}
            </div>
            {% endfor %}
        </div>
    {% endif %}
    <header>
        <h1>Olá, colaborador!</h1>
        <h4>Preencha os dados abaixo para acessar o documento.</h4>
    </header>

    <form method="POST">
        {% csrf_token %}
        <div class="form-group">
          <label for="exampleInputEmail1">Email Corporativo:</label>
          <input type="email" class="form-control" id="exampleInputEmail1" name="email" required>
        </div>
        <div class="form-group">
          <label for="exampleInputPassword1">Nome e sobrenome:</label>
          <input type="text" class="form-control" name="name" required>
        </div>
        
        <div class="btn-wrapper">
            <button type="submit" class="btn btn-primary">Acessar</button>
            <button type="button" class="btn btn-lg" data-toggle="popover" data-placement="right" title="Os dados serão utilizados apenas para contabilizarmos os acessos ao documento.">
                ?
            </button>
        </div>
    </form>
    </body>
        
    <img src="../static/Logomarca-Buriti.png" alt="Buriti Logo" width="100px">

</html>
<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script src="{% static 'js/bootstrap.bundle.min.js' %}"></script>

<script>
    $(function () {
        $('[data-toggle="popover"]').popover()
    })
</script>
